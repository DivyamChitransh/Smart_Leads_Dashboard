services:
  mongodb:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smart_leads

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/smart_leads
      JWT_SECRET: change_this_to_a_secure_secret_at_least_32_chars
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
      DEFAULT_PAGE_SIZE: 10
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:5000/api
    container_name: smart-leads-web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
